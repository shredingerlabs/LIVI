name: 'Push badges'
description: 'Write and push badge JSON files to version branch'

inputs:
  branch:
    required: true
    description: 'Branch name label (e.g. main/dev)'
  version:
    required: true
    description: 'App version (from package.json)'
  node:
    required: true
    description: 'Node version'
  pnpm:
    required: true
    description: 'pnpm version'
  electron:
    required: true
    description: 'Electron semver (e.g. 42.2.0)'
  chromium:
    required: true
    description: 'Chromium version embedded in Electron'
  electron-date:
    required: true
    description: 'Electron release date (de-DE formatted)'
  repo:
    required: true
    description: 'owner/repo'
  token:
    required: true
    description: 'GitHub token to push'
  coverage-main:
    required: false
    default: ''
    description: 'Main coverage percent (e.g. 46.10%)'
  coverage-renderer:
    required: false
    default: ''
    description: 'Renderer coverage percent (e.g. 8.01%)'
  gstreamer:
    required: false
    default: ''
    description: 'GStreamer version (e.g. 1.28.1)'

runs:
  using: 'composite'
  steps:
    - name: Push badges
      shell: bash
      env:
        BRANCH_NAME: ${{ inputs.branch }}
        VERSION: ${{ inputs.version }}
        NODE_VERSION: ${{ inputs.node }}
        PNPM_VERSION: ${{ inputs.pnpm }}
        ELECTRON_SEMVER: ${{ inputs.electron }}
        CHROMIUM_VER: ${{ inputs.chromium }}
        ELECTRON_DATE_DE: ${{ inputs.electron-date }}
        GH_REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}
        MAIN_COVERAGE: ${{ inputs.coverage-main }}
        RENDERER_COVERAGE: ${{ inputs.coverage-renderer }}
        GSTREAMER_VERSION: ${{ inputs.gstreamer }}
      run: |
        set -euo pipefail

        rm -rf temp-badges
        mkdir temp-badges
        cd temp-badges

        git clone --depth=1 --branch version "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}" .

        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        coverage_color() {
          local value="${1%%%}"
          if ! [[ "$value" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            echo "lightgrey"
            return
          fi
          awk -v v="$value" 'BEGIN{
            if (v >= 80) print "success";
            else if (v >= 60) print "yellow";
            else if (v >= 40) print "orange";
            else print "red";
          }'
        }

        mkdir -p .github/badges
        echo "{\"schemaVersion\":1,\"label\":\"${BRANCH_NAME}\",\"message\":\"v${VERSION}\",\"color\":\"lightblue\"}" > ".github/badges/${BRANCH_NAME}-version.json"
        echo "{\"schemaVersion\":1,\"label\":\"node\",\"message\":\"${NODE_VERSION}\",\"color\":\"lightgrey\"}" > ".github/badges/${BRANCH_NAME}-node.json"
        echo "{\"schemaVersion\":1,\"label\":\"pnpm\",\"message\":\"${PNPM_VERSION}\",\"color\":\"lightgrey\"}" > ".github/badges/${BRANCH_NAME}-pnpm.json"
        echo "{\"schemaVersion\":1,\"label\":\"electron\",\"message\":\"${ELECTRON_SEMVER}\",\"color\":\"lightblue\"}" > ".github/badges/${BRANCH_NAME}-electron.json"
        echo "{\"schemaVersion\":1,\"label\":\"chromium\",\"message\":\"${CHROMIUM_VER}\",\"color\":\"informational\"}" > ".github/badges/${BRANCH_NAME}-electron-chromium.json"
        echo "{\"schemaVersion\":1,\"label\":\"released\",\"message\":\"${ELECTRON_DATE_DE}\",\"color\":\"success\"}" > ".github/badges/${BRANCH_NAME}-electron-date.json"
        echo "{\"schemaVersion\":1,\"label\":\"Electron\",\"message\":\"${ELECTRON_SEMVER} • Chromium ${CHROMIUM_VER} • ${ELECTRON_DATE_DE}\",\"color\":\"blue\"}" > ".github/badges/${BRANCH_NAME}-electron-info.json"

        if [ -n "${GSTREAMER_VERSION}" ]; then
          echo "{\"schemaVersion\":1,\"label\":\"gstreamer\",\"message\":\"${GSTREAMER_VERSION}\",\"color\":\"blue\"}" > ".github/badges/${BRANCH_NAME}-gstreamer.json"

          if [ "${BRANCH_NAME}" = "dev" ] && [ ! -f ".github/badges/main-gstreamer.json" ]; then
            cp ".github/badges/${BRANCH_NAME}-gstreamer.json" ".github/badges/main-gstreamer.json"
          fi
        fi

        if [ -n "${MAIN_COVERAGE}" ]; then
          MAIN_COVERAGE_COLOR="$(coverage_color "${MAIN_COVERAGE}")"
          echo "{\"schemaVersion\":1,\"label\":\"coverage main\",\"message\":\"${MAIN_COVERAGE}\",\"color\":\"${MAIN_COVERAGE_COLOR}\"}" > ".github/badges/${BRANCH_NAME}-coverage-main.json"

          # Fallback alias for README links that target main before first main coverage publish.
          if [ "${BRANCH_NAME}" = "dev" ] && [ ! -f ".github/badges/main-coverage-main.json" ]; then
            cp ".github/badges/${BRANCH_NAME}-coverage-main.json" ".github/badges/main-coverage-main.json"
          fi
        fi

        if [ -n "${RENDERER_COVERAGE}" ]; then
          RENDERER_COVERAGE_COLOR="$(coverage_color "${RENDERER_COVERAGE}")"
          echo "{\"schemaVersion\":1,\"label\":\"coverage renderer\",\"message\":\"${RENDERER_COVERAGE}\",\"color\":\"${RENDERER_COVERAGE_COLOR}\"}" > ".github/badges/${BRANCH_NAME}-coverage-renderer.json"

          # Fallback alias for README links that target main before first main coverage publish.
          if [ "${BRANCH_NAME}" = "dev" ] && [ ! -f ".github/badges/main-coverage-renderer.json" ]; then
            cp ".github/badges/${BRANCH_NAME}-coverage-renderer.json" ".github/badges/main-coverage-renderer.json"
          fi
        fi

        git add .github/badges/${BRANCH_NAME}-*.json
        git commit -m "chore(badges): ${BRANCH_NAME} -> v${VERSION}, node ${NODE_VERSION}, pnpm ${PNPM_VERSION}, electron ${ELECTRON_SEMVER} (chromium ${CHROMIUM_VER}, ${ELECTRON_DATE_DE}), gstreamer ${GSTREAMER_VERSION:-n/a}, coverage main ${MAIN_COVERAGE:-n/a}, renderer ${RENDERER_COVERAGE:-n/a}" || echo "No changes"
        git push
