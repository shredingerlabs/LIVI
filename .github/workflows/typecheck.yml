name: typecheck

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

jobs:
  checks:
    name: Lint, Typecheck, Tests
    if: ${{ github.actor != 'github-actions' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0
      # usb@2.17.0 binding.gyp hardcodes -std=c++14 but node-addon-api@8 uses C++17 features
      CXXFLAGS: -std=c++17

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup latest Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install
          echo "pnpm version: $(pnpm -v)"
          node -e "const v=require('child_process').execSync('pnpm -v').toString().trim(); if(!/^11\\./.test(v)){console.error('Expected pnpm 11.x, got', v); process.exit(1);} console.log('pnpm 11 OK');"

      - name: Resolve pnpm store path
        id: pnpm_store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-x64-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-x64-

      - name: Ensure native build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 python3-dev libusb-1.0-0-dev libudev-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Run Biome checks
        run: pnpm run lint:check

      - name: Run TypeScript type-check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

  coverage:
    name: Coverage
    if: ${{ github.actor != 'github-actions' && github.event_name == 'pull_request' }}
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0
      # usb@2.17.0 binding.gyp hardcodes -std=c++14 but node-addon-api@8 uses C++17 features
      CXXFLAGS: -std=c++17

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup latest Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install
          echo "pnpm version: $(pnpm -v)"
          node -e "const v=require('child_process').execSync('pnpm -v').toString().trim(); if(!/^11\\./.test(v)){console.error('Expected pnpm 11.x, got', v); process.exit(1);} console.log('pnpm 11 OK');"

      - name: Resolve pnpm store path
        id: pnpm_store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-x64-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-x64-

      - name: Ensure native build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 python3-dev libusb-1.0-0-dev libudev-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Run coverage
        run: pnpm run coverage
