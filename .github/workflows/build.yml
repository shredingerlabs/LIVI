name: build
run-name: 'build → ${{ github.event.inputs.branch || github.event.workflow_run.head_branch || github.ref_name }}'

on:
  workflow_run:
    workflows: ['typecheck']
    branches: [main]
    types: [completed]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      linux_x64:
        description: 'Build Linux x64 (AppImage)'
        type: boolean
        default: true
      linux_arm64:
        description: 'Build Linux arm64 (AppImage)'
        type: boolean
        default: true
      macos_arm64:
        description: 'Build macOS arm64 (dmg)'
        type: boolean
        default: true
      windows_x64:
        description: 'Build Windows x64 (nsis)'
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

jobs:
  plan:
    name: Plan build matrix
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      is_empty: ${{ steps.plan.outputs.is_empty }}
    steps:
      - id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_LINUX_X64: ${{ inputs.linux_x64 }}
          IN_LINUX_ARM64: ${{ inputs.linux_arm64 }}
          IN_MACOS_ARM64: ${{ inputs.macos_arm64 }}
          IN_WINDOWS_X64: ${{ inputs.windows_x64 }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          const eventName = process.env.EVENT_NAME;

          const isTrue = (v) => String(v).toLowerCase() === 'true';

          const inputs = {
            linux_x64: isTrue(process.env.IN_LINUX_X64),
            linux_arm64: isTrue(process.env.IN_LINUX_ARM64),
            macos_arm64: isTrue(process.env.IN_MACOS_ARM64),
            windows_x64: isTrue(process.env.IN_WINDOWS_X64),
          };

          const include = [];
          const add = (os, runner, arch, artifact_ext) => {
            include.push({ os, runner, arch, artifact_ext });
          };

          if (eventName === 'workflow_run') {
            // main: always build everything
            add('linux', 'ubuntu-latest', 'x64', 'AppImage');
            add('linux', 'ubuntu-24.04-arm', 'arm64', 'AppImage');
            add('macos', 'macos-latest', 'arm64', 'dmg');
            add('windows', 'windows-2025-vs2026', 'x64', 'exe');
          } else {
            // manual: only selected
            if (inputs.linux_x64) add('linux', 'ubuntu-latest', 'x64', 'AppImage');
            if (inputs.linux_arm64) add('linux', 'ubuntu-24.04-arm', 'arm64', 'AppImage');
            if (inputs.macos_arm64) add('macos', 'macos-latest', 'arm64', 'dmg');
            if (inputs.windows_x64) add('windows', 'windows-2025-vs2026', 'x64', 'exe');
          }

          const matrixObj = { include };
          const matrix = JSON.stringify(matrixObj);

          const isEmpty = include.length === 0 ? 'true' : 'false';

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_empty=${isEmpty}\n`);

          console.log('Planned matrix:', matrix);
          console.log('Empty:', isEmpty);
          NODE

  build:
    name: Build ${{ matrix.artifact_ext }} (${{ matrix.os }}-${{ matrix.arch }}) on ${{ github.event.inputs.branch || github.event.workflow_run.head_branch || github.ref_name }}
    needs: plan
    if: ${{ needs.plan.outputs.is_empty != 'true' }}
    runs-on: ${{ matrix.runner }}
    env:
      BUILD_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.event.workflow_run.head_branch }}
      HUSKY: 0
      ELECTRON_CACHE: .cache/electron
      ELECTRON_BUILDER_CACHE: .cache/electron-builder
      # usb@2.17.0 binding.gyp hardcodes -std=c++14 but node-addon-api@8 uses C++17 features
      CXXFLAGS: -std=c++17

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', github.event.inputs.branch) || github.event.workflow_run.head_sha }}

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: .pnpm-store
          key: pnpm-store-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Cache build caches (vite/esbuild)
        if: ${{ matrix.os != 'windows' }}
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.vite
            node_modules/.cache
          key: build-cache-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            build-cache-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: .cache/electron
          key: electron-cache-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            electron-cache-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Cache electron-builder binaries
        uses: actions/cache@v5
        with:
          path: .cache/electron-builder
          key: eb-cache-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'electron-builder.yml') }}
          restore-keys: |
            eb-cache-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Setup Node + pnpm
        id: pnpm
        uses: ./.github/actions/pnpm
        with:
          node-version: '24'
          pnpm-major: '11'
          pnpm-store-dir: '.pnpm-store'

      - name: Read version from package.json
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read Electron semver from package.json
        id: el
        shell: bash
        run: |
          echo "semver=$(node -p 'require(\"./package.json\").devDependencies.electron')" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # Linux x64
      # ----------------------------
      - name: Install Linux deps [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential python3 python3-dev libusb-1.0-0-dev libudev-dev \
              pkg-config libusb-1.0-0 libudev1 ca-certificates \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install deps (pnpm) [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        run: pnpm install --frozen-lockfile

      - name: Collect test coverage [linux-x64]
        id: coverage
        if: matrix.os == 'linux' && matrix.arch == 'x64' && (env.BUILD_BRANCH == 'main' || env.BUILD_BRANCH == 'dev')
        shell: bash
        run: |
          set -euo pipefail
          pnpm run coverage

          read_coverage_pct() {
            node -e 'const fs=require("fs");const p=process.argv[1];try{const j=JSON.parse(fs.readFileSync(p,"utf8"));const pct=Number(j?.total?.lines?.pct);process.stdout.write(Number.isFinite(pct)?pct.toFixed(2)+"%":"0.00%")}catch{process.stdout.write("0.00%")}' "$1"
          }

          MAIN_COVERAGE=$(read_coverage_pct "coverage/main/coverage-summary.json")
          RENDERER_COVERAGE=$(read_coverage_pct "coverage/renderer/coverage-summary.json")

          echo "main=$MAIN_COVERAGE" >> "$GITHUB_OUTPUT"
          echo "renderer=$RENDERER_COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage main: $MAIN_COVERAGE"
          echo "Coverage renderer: $RENDERER_COVERAGE"

      - name: Build for Linux x64 (native Ubuntu)
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          set -euo pipefail
          ELECTRON_VERSION=$(node -p "require('./node_modules/electron/package.json').version")
          npx --yes node-gyp install --target="$ELECTRON_VERSION" --dist-url=https://artifacts.electronjs.org/headers/dist
          pnpm run typecheck
          rm -rf dist
          pnpm run build:linux

      # ----------------------------
      # Linux arm64
      # ----------------------------
      - name: Install Linux deps [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential python3 python3-dev libusb-1.0-0-dev libudev-dev \
              pkg-config libusb-1.0-0 libudev1 ca-certificates \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install deps (pnpm) [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: pnpm install --frozen-lockfile

      - name: Build for Linux arm64 (native Ubuntu)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          ELECTRON_VERSION=$(node -p "require('./node_modules/electron/package.json').version")
          npx --yes node-gyp install --target="$ELECTRON_VERSION" --dist-url=https://artifacts.electronjs.org/headers/dist
          pnpm run typecheck
          rm -rf dist
          pnpm run build:armLinux

      # ----------------------------
      # macOS arm64
      # ----------------------------
      - name: Install deps (brew) [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          brew update >/dev/null
          for pkg in libusb pkg-config; do
            if ! brew list --versions "$pkg" >/dev/null; then
              brew install "$pkg" >/dev/null
            elif brew outdated --quiet | grep -q "^$pkg\$"; then
              brew upgrade "$pkg" >/dev/null
            fi
          done

      # Runtime + devel framework so node-gyp can build the gst-video addon
      # (devel = headers + pkg-config, runtime = the dylibs to link against)
      - name: Install GStreamer (runtime + devel) [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          GST_VERSION=$(curl -fsSL https://gstreamer.freedesktop.org/data/pkg/osx/ \
            | grep -oE 'href="[0-9]+\.[0-9]+\.[0-9]+/"' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | awk -F. '$2 % 2 == 0' \
            | sort -V \
            | tail -1)
          echo "GStreamer: $GST_VERSION"
          base="https://gstreamer.freedesktop.org/data/pkg/osx/${GST_VERSION}"
          curl -fL -o gst-runtime.pkg "${base}/gstreamer-1.0-${GST_VERSION}-universal.pkg"
          curl -fL -o gst-devel.pkg "${base}/gstreamer-1.0-devel-${GST_VERSION}-universal.pkg"
          sudo installer -pkg gst-runtime.pkg -target /
          sudo installer -pkg gst-devel.pkg -target /

      - name: Install deps (pnpm) [macos-arm64]
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build for macOS arm64 (native)
        if: matrix.os == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          ELECTRON_VERSION=$(node -p "require('./node_modules/electron/package.json').version")
          npx --yes node-gyp install --target="$ELECTRON_VERSION" --dist-url=https://artifacts.electronjs.org/headers/dist
          pnpm run typecheck
          pnpm run build:mac

      # ----------------------------
      # Windows x64
      # ----------------------------
      - name: Install GStreamer (runtime + devel) [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # GStreamer uses GNOME-style versioning: even minor = stable, odd = dev.
          $listing = (Invoke-WebRequest -Uri 'https://gstreamer.freedesktop.org/data/pkg/windows/' -UseBasicParsing).Content
          $versions = [regex]::Matches($listing, 'href="([0-9]+\.[0-9]+\.[0-9]+)/"') |
            ForEach-Object { [Version]$_.Groups[1].Value } |
            Where-Object { $_.Minor % 2 -eq 0 } |
            Sort-Object
          if (-not $versions -or $versions.Count -eq 0) {
            throw 'Failed to resolve latest stable GStreamer version from windows listing'
          }
          $gstVersion = $versions[-1].ToString()
          Write-Host "Resolved Windows GStreamer: $gstVersion"

          $url = "https://gstreamer.freedesktop.org/data/pkg/windows/$gstVersion/msvc/gstreamer-1.0-msvc-x86_64-$gstVersion.exe"
          curl.exe -L $url -o 'gstreamer-msvc-x86_64.exe'

          $p = Start-Process `
            -FilePath '.\gstreamer-msvc-x86_64.exe' `
            -ArgumentList @('/SP-', '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/TYPE=devel') `
            -PassThru
          if (-not $p.WaitForExit(180000)) {
            try { $p.Kill() } catch {}
            throw 'GStreamer installer timed out after 3 minutes'
          }
          if ($p.ExitCode -ne 0) {
            throw "GStreamer installer failed with exit code $($p.ExitCode)"
          }

          $root = "$env:ProgramFiles\gstreamer\1.0\msvc_x86_64"
          if (-not (Test-Path "$root\lib\gstreamer-1.0.lib")) {
            throw "GStreamer dev libs not found at $root"
          }
          # Export the 8.3 short path so the space in "Program Files" cannot break
          # the include/lib paths binding.gyp feeds to MSBuild
          $shortRoot = (New-Object -ComObject Scripting.FileSystemObject).GetFolder($root).ShortPath
          Write-Host "GStreamer MSVC root (8.3): $shortRoot"
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$shortRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install deps (pnpm) [windows-x64]
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build for Windows x64 (native)
        if: matrix.os == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ELECTRON_VERSION = node -p "require('./node_modules/electron/package.json').version"
          npx --yes node-gyp install --target="$ELECTRON_VERSION" --dist-url=https://artifacts.electronjs.org/headers/dist
          pnpm run typecheck
          pnpm run build:win

      # ----------------------------
      # Upload artifacts
      # ----------------------------
      - name: Upload AppImage [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v6
        with:
          name: LIVI-${{ steps.pkg.outputs.version }}-linux-x64.AppImage
          path: dist/*.AppImage
          retention-days: 7

      - name: Upload deb [linux-x64]
        if: matrix.os == 'linux' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v6
        with:
          name: LIVI-${{ steps.pkg.outputs.version }}-linux-x64.deb
          path: dist/*.deb
          retention-days: 7

      - name: Upload AppImage [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v6
        with:
          name: LIVI-${{ steps.pkg.outputs.version }}-linux-arm64.AppImage
          path: dist/*.AppImage
          retention-days: 7

      - name: Upload deb [linux-arm64]
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v6
        with:
          name: LIVI-${{ steps.pkg.outputs.version }}-linux-arm64.deb
          path: dist/*.deb
          retention-days: 7

      - name: Upload Artifacts
        if: matrix.os != 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os == 'windows' && format('LIVI-{0}-windows-{1}.exe', steps.pkg.outputs.version, matrix.arch) || format('LIVI-{0}-{1}-{2}.{3}', steps.pkg.outputs.version, matrix.os, matrix.arch, matrix.artifact_ext)}}
          path: |
            dist/*.dmg
            dist/*.exe
          retention-days: 7

      - name: Read GStreamer asset version
        id: gst
        if: matrix.os == 'linux' && matrix.arch == 'x64' && (env.BUILD_BRANCH == 'main' || env.BUILD_BRANCH == 'dev')
        shell: bash
        run: |
          for f in assets/gstreamer/linux-x64/version.txt \
                   assets/gstreamer/macos-arm64/version.txt \
                   assets/gstreamer/linux-arm64/version.txt \
                   assets/gstreamer/windows-x64/version.txt; do
            if [[ -f "$f" ]]; then
              v="$(cat "$f")"
              echo "version=$v" >> "$GITHUB_OUTPUT"
              echo "Found GStreamer version $v in $f"
              exit 0
            fi
          done
          echo "version=" >> "$GITHUB_OUTPUT"
          echo "No GStreamer version.txt found"

      - name: Read electron release metadata
        id: electron
        if: matrix.os == 'linux' && matrix.arch == 'x64' && (env.BUILD_BRANCH == 'main' || env.BUILD_BRANCH == 'dev')
        shell: bash
        run: |
          set -euo pipefail

          # Electron version from the installed package.
          SEMVER="$(node -e "console.log(require('./node_modules/electron/package.json').version)")"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

          # Chromium version + release date come from electron's official release feed
          FEED="$(curl -fsSL "https://releases.electronjs.org/releases.json" || echo '[]')"

          CHROMIUM="$(printf '%s' "$FEED" | SEMVER="$SEMVER" node -e "
            let d=''; process.stdin.on('data', c => d+=c); process.stdin.on('end', () => {
              try {
                const r = JSON.parse(d).find(x => x.version === process.env.SEMVER);
                process.stdout.write((r && r.chrome) || 'unknown');
              } catch { process.stdout.write('unknown'); }
            });
          ")"
          echo "chromium=${CHROMIUM}" >> "$GITHUB_OUTPUT"

          DATE_DE="$(printf '%s' "$FEED" | SEMVER="$SEMVER" node -e "
            let d=''; process.stdin.on('data', c => d+=c); process.stdin.on('end', () => {
              try {
                const r = JSON.parse(d).find(x => x.version === process.env.SEMVER);
                const iso = r && (r.fullDate || r.date);
                if (!iso) { process.stdout.write('unknown'); return; }
                process.stdout.write(new Intl.DateTimeFormat('de-DE', {
                  timeZone: 'Europe/Berlin', day: '2-digit', month: '2-digit', year: 'numeric'
                }).format(new Date(iso)));
              } catch { process.stdout.write('unknown'); }
            });
          ")"
          echo "date=${DATE_DE}" >> "$GITHUB_OUTPUT"

          echo "electron ${SEMVER} / chromium ${CHROMIUM} / released ${DATE_DE}"

      - name: Push badges to version branch
        if: matrix.os == 'linux' && matrix.arch == 'x64' && (env.BUILD_BRANCH == 'main' || env.BUILD_BRANCH == 'dev')
        uses: ./.github/actions/badges
        with:
          branch: ${{ env.BUILD_BRANCH }}
          version: ${{ steps.pkg.outputs.version }}
          node: ${{ steps.pnpm.outputs.node }}
          pnpm: ${{ steps.pnpm.outputs.pnpm }}
          electron: ${{ steps.electron.outputs.semver }}
          chromium: ${{ steps.electron.outputs.chromium }}
          electron-date: ${{ steps.electron.outputs.date }}
          coverage-main: ${{ steps.coverage.outputs.main }}
          coverage-renderer: ${{ steps.coverage.outputs.renderer }}
          gstreamer: ${{ steps.gst.outputs.version }}
          repo: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
