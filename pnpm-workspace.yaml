packages:
  - native/gst-video
overrides:
  # @electron/rebuild bundles node-gyp 11.5.0, which cannot detect VS2026 on the
  # windows-2025-vs2026 runner (nodejs/node-gyp#3214, pnpm/pnpm#10268). 12.x adds
  # support; force the whole tree to it until @electron/rebuild bumps its node-gyp
  node-gyp: ^12.3.0
allowBuilds:
  electron-winstaller: true
  esbuild: true
  protobufjs: true
  unrs-resolver: true
minimumReleaseAge: 0
